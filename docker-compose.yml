services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: osh
      POSTGRES_PASSWORD: osh
      POSTGRES_DB: osh
    ports:
      - "5432:5432"
    volumes:
      - osh_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osh -d osh"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - osh_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  osh_pg:
  osh_redis:
